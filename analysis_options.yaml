# Strict, team-ready static analysis for Bayaan.
# Built on very_good_analysis (a superset of flutter_lints / lints).
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    # Treat missing return types and dead code as errors in CI.
    always_declare_return_types: error
    unused_import: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    # The design intentionally uses large, descriptive widget build methods;
    # relax a couple of very_good rules that fight faithful UI porting.
    public_member_api_docs: false
    lines_longer_than_80_chars: false
    # Flutter widgets legitimately have deep call trees.
    prefer_int_literals: false
    # Cascades hurt readability across timer/closure-heavy controllers.
    cascade_invocations: false
