name: bayaan
description: "Bayaan - AI assistant for Abu Dhabi official statistics (front-end)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  # Vector brand mark rendering
  flutter_svg: ^2.3.0
  # Lucide (feather-style) stroke icons used across the design
  lucide_icons: ^0.257.0
  # State management
  provider: ^6.1.5+1

dev_dependencies:
  # Deterministic control of timers/microtasks in state-machine tests
  fake_async: ^1.3.3
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  # Strict, opinionated lint ruleset for a team-ready codebase
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true

  # Geist / Geist Mono are bundled locally (rather than fetched at runtime) so
  # typography renders instantly and reliably on every device, including mobile
  # networks where a font CDN request could be slow or blocked.
  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
    - family: Geist Mono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/GeistMono-SemiBold.ttf
          weight: 600
