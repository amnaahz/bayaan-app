name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize deploys; don't cancel an in-progress one.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & publish to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # `--no-web-resources-cdn` self-hosts CanvasKit so startup doesn't depend
      # on the gstatic CDN (which can be slow/blocked on some mobile networks).
      - name: Build web
        run: flutter build web --release --no-web-resources-cdn --base-href "/${{ github.event.repository.name }}/"

      - name: Add SPA fallback + disable Jekyll
        run: |
          cp build/web/index.html build/web/404.html
          touch build/web/.nojekyll

      # Publish the static build to the gh-pages branch. GitHub Pages serves it
      # directly (Pages source = gh-pages branch), which avoids the Actions
      # "deploy-pages" environment that can queue for a long time.
      - name: Publish to gh-pages
        run: |
          cd build/web
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.email="github-actions[bot]@users.noreply.github.com" \
              -c user.name="github-actions[bot]" \
              commit -q -m "Deploy ${{ github.sha }}"
          git push -q -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
